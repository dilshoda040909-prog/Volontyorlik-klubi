<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Posts</title>

<style>
body {
  font-family: Arial;
  background: #f3f7f3;
  margin: 0;
}

header {
  background: #2f5d3a;
  color: white;
  padding: 15px;
  text-align: center;
}

.post {
  background: white;
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  border-left: 5px solid #2f5d3a;
  border-radius: 10px;
}

.post img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h2>Posts 🌿</h2>
</header>

<div id="posts"></div>

<script>

function loadPosts() {
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="post">
        <h3>${p.title}</h3>
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

loadPosts();

</script>

</body>
</html>
