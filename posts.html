<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Posts - 339 Club</title>

<style>
body {
  font-family: Arial;
  background: #f3f7f3;
  margin: 0;
}

header {
  background: #2f5d3a;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: #2f5d3a;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

.post {
  background: white;
  margin: 15px 0;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.post img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h2>Posts 🌿</h2>
</header>

<div class="container">

  <h3>Create Post 📸</h3>

  <input id="title" placeholder="Title">
  <textarea id="text" placeholder="Text"></textarea>
  <input id="image" placeholder="Image URL (paste link)">

  <button onclick="addPost()">Post</button>

  <h3>All Posts</h3>
  <div id="posts"></div>

</div>

<script>

function addPost() {
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;
  let image = document.getElementById("image").value;

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  posts.unshift({ title, text, image });

  localStorage.setItem("posts", JSON.stringify(posts));

  showPosts();
}

function showPosts() {
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="post">
        <h3>${p.title}</h3>
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

showPosts();

</script>

</body>
</html>
