<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Volontyorlikka Qo‘shilish</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: #e9f5e9;
}

/* TITLE */
.title {
  text-align: center;
  font-family: "Playfair Display", serif;
  font-size: 50px;
  color: #2f5d3a;
  margin-top: 30px;
}

/* FORM BOX */
.form-box {
  background: white;
  max-width: 600px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* FORM TITLE */
.form-title {
  font-family: "Playfair Display", serif;
  font-size: 28px;
  color: #2f5d3a;
  margin-bottom: 20px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-family: "Poppins", sans-serif;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #2f5d3a;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #24472b;
}
</style>
</head>

<body>

<h1 class="title">Bizga qo‘shiling 🌿</h1>

<div class="form-box">

  <div class="form-title">Volunteer Application</div>

  <form action="https://formspree.io/f/xwvalkbq" method="POST">

    <input type="text" name="name" placeholder="Ism familiya*" required>

    <input type="text" name="grade" placeholder="Grade*" required>

    <input type="email" name="email" placeholder="Email address (optional)">

    <input type="tel" name="phone" placeholder="Phone*" required>

    <textarea name="interest" placeholder="Qiziqishlar"></textarea>

    <textarea name="free_time" placeholder="Bosh vaqtlar"></textarea>

    <textarea name="reason" placeholder="Nimaga qo‘shilishni istaysiz"></textarea>

    <button type="submit">Submit Application</button>

  </form>

</div>

</body>
</html>
<script>
document.querySelector("form").addEventListener("submit", function() {

  let app = {
    name: document.querySelector("[name='name']").value,
    grade: document.querySelector("[name='grade']").value,
    email: document.querySelector("[name='email']").value,
    phone: document.querySelector("[name='phone']").value,
    interest: document.querySelector("[name='interest']").value,
    reason: document.querySelector("[name='reason']").value
  };

  let apps = JSON.parse(localStorage.getItem("applications") || "[]");
  apps.unshift(app);

  localStorage.setItem("applications", JSON.stringify(apps));

});
</script>
