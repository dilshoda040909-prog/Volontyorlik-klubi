<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
  font-family: Arial;
  background: #f3f7f3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
  width: 300px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: #2f5d3a;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 6px;
}

#panel {
  display: none;
}
</style>
</head>

<body>

<div class="box">

  <div id="login">
    <h2>Admin Login 🔐</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="panel">

    <h3>Create Post</h3>

    <input id="title" placeholder="Title">
    <input id="text" placeholder="Text">

    <button onclick="addPost()">Post</button>

  </div>

</div>

<script>

const PASSWORD = "339club"; // change this anytime

function login() {
  let p = document.getElementById("pass").value;

  if (p === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* SAVE POSTS */
function addPost() {
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  posts.unshift({ title, text });

  localStorage.setItem("posts", JSON.stringify(posts));

  alert("Post added!");
}

</script>

</body>
</html>
