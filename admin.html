<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #e9f5e9;
  text-align: center;
  margin: 0;
}

.box {
  background: white;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #2f5d3a;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

#panel {
  display: none;
}

.post {
  background: white;
  max-width: 600px;
  margin: 10px auto;
  padding: 10px;
  border-left: 5px solid #2f5d3a;
}
</style>
</head>

<body>

<div class="box">

  <h2>Admin Login 🔐</h2>

  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="panel">
    <h3>Create Post 📸</h3>

    <input id="title" placeholder="Title">
    <textarea id="text" placeholder="Text"></textarea>

    <!-- IMAGE UPLOAD -->
    <input type="file" id="image" accept="image/*">

    <button onclick="addPost()">Post</button>
  </div>

</div>

<h2>Preview Posts</h2>
<div id="posts"></div>

<script>

const PASSWORD = "339club";

/* LOGIN */
function login() {
  let p = document.getElementById("pass").value;

  if (p === PASSWORD) {
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* ADD POST */
function addPost() {
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;
  let file = document.getElementById("image").files[0];

  let reader = new FileReader();

  reader.onload = function () {

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.unshift({
      title: title,
      text: text,
      image: file ? reader.result : ""
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    showPosts();
  };

  if (file) {
    reader.readAsDataURL(file);
  } else {
    reader.onload();
  }
}

/* SHOW POSTS */
function showPosts() {
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="post">
        <h3>${p.title}</h3>
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}" style="width:100%">` : ""}
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

showPosts();

</script>

</body>
</html>
