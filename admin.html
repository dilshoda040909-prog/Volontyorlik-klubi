<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #f3f7f3;
  text-align: center;
  padding: 40px;
}

.box {
  background: white;
  padding: 20px;
  max-width: 400px;
  margin: auto;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px 15px;
  background: #2f5d3a;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.post {
  background: white;
  margin: 15px auto;
  padding: 15px;
  max-width: 500px;
  border-left: 5px solid #2f5d3a;
}
</style>
</head>

<body>

<h1>Admin Panel 🔐</h1>

<div class="box">

  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="panel" style="display:none;">
    <h3>Create Post</h3>

    <input id="title" placeholder="Title">
    <textarea id="content" placeholder="Content"></textarea>

    <button onclick="addPost()">Post</button>
  </div>

</div>

<h2>Published Posts</h2>
<div id="posts"></div>

<script>

const PASSWORD = "339club";

function login() {
  let p = document.getElementById("pass").value;
  if (p === PASSWORD) {
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function addPost() {
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  let post = {
    title,
    content
  };

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  posts.unshift(post);
  localStorage.setItem("posts", JSON.stringify(posts));

  showPosts();
}

function showPosts() {
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let html = "";
  posts.forEach(p => {
    html += `
      <div class="post">
        <h3>${p.title}</h3>
        <p>${p.content}</p>
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

showPosts();

</script>

</body>
</html>
