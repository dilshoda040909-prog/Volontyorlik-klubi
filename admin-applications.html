<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Admin Applications</title>

<style>
body {
  font-family: Arial;
  background: #f3f7f3;
  margin: 0;
}

header {
  background: #2f5d3a;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-left: 5px solid #2f5d3a;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h2>Admin Panel — Applications 🌿</h2>
</header>

<div class="container" id="list"></div>

<script>

/* Load applications from localStorage */
let apps = JSON.parse(localStorage.getItem("applications") || "[]");

let html = "";

if (apps.length === 0) {
  html = "<p>No applications yet.</p>";
}

apps.forEach(a => {
  html += `
    <div class="card">
      <h3>${a.name}</h3>
      <p><b>Grade:</b> ${a.grade}</p>
      <p><b>Email:</b> ${a.email}</p>
      <p><b>Phone:</b> ${a.phone}</p>
      <p><b>Interest:</b> ${a.interest}</p>
      <p><b>Reason:</b> ${a.reason}</p>
    </div>
  `;
});

document.getElementById("list").innerHTML = html;

</script>

</body>
</html>
