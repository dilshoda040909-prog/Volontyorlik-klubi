<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Admin Posts</title>

<style>
body {
  font-family: Arial;
  background: #e9f5e9;
  text-align: center;
}

.box {
  background: white;
  max-width: 400px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #2f5d3a;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

#panel {
  display: none;
}

.post {
  background: white;
  margin: 15px auto;
  padding: 15px;
  max-width: 500px;
  border-left: 5px solid #2f5d3a;
}
</style>
</head>

<body>

<div class="box">

  <h2>Admin Login 🔐</h2>

  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="panel">

    <h3>Create Post 📸</h3>

    <input id="title" placeholder="Title">
    <textarea id="text" placeholder="Text"></textarea>
    <input id="image" placeholder="Image URL">

    <button onclick="addPost()">Post</button>

  </div>

</div>

<h2>Posts</h2>
<div id="posts"></div>

<script>

const PASSWORD = "339club";

function login() {
  let p = document.getElementById("pass").value;

  if (p === PASSWORD) {
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* ADD POST (ONLY ADMIN) */
function addPost() {
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;
  let image = document.getElementById("image").value;

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  posts.unshift({ title, text, image });

  localStorage.setItem("posts", JSON.stringify(posts));

  showPosts();
}

function showPosts() {
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="post">
        <h3>${p.title}</h3>
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}" style="width:100%">` : ""}
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

showPosts();

</script>

</body>
</html>
